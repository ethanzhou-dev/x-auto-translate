<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>X Auto Translator</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="header">
        <div>
            <div class="title-row">
                <h3>X 自动翻译</h3>
            </div>
            <p>推文与评论外语自动翻译</p>
        </div>
        <label class="toggle-switch" title="总开关">
            <input type="checkbox" id="enableToggle" checked>
            <span class="toggle-slider"></span>
        </label>
    </div>

    <div class="settings-panel">
        <div class="settings-header" id="settingsHeader" style="cursor: default;">
            <span class="settings-title">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="icon-gear">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
                翻译设置
            </span>
        </div>
        <div class="settings-content open" id="settingsContent" style="display: block;">
            <div class="control-group" style="border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px;">
                <label for="onlyComments">仅自动翻译评论区</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="onlyComments">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="control-group">
                <label for="targetLang">目标语言</label>
                <select id="targetLang" style="background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 4px; outline: none; font-size: 13px;">
                    <option value="zh-CN">简体中文</option>
                    <option value="zh-TW">繁体中文</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                </select>
            </div>
        </div>
    </div>

    <div id="status">已自动保存</div>

    <script src="popup.js"></script>
</body>

</html>
